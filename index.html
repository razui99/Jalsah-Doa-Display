<script>

const API_URL = "YOUR_SCRIPT_WEBAPP_URL";

let doaList = [];

async function loadDoa(){

    try{

        const response = await fetch(API_URL);
        doaList = await response.json();

        if(doaList.length === 0){

            document.getElementById("doaText").innerHTML =
            "Belum ada permohonan doa.";

            return;
        }

        showRandomDoa();

        setInterval(() => {

            showRandomDoa();

        }, 10000);

    }catch(err){

        document.getElementById("doaText").innerHTML =
        "Gagal memuatkan data.";

        console.error(err);
    }
}

function showRandomDoa(){

    const random =
        doaList[Math.floor(Math.random() * doaList.length)];

    document.getElementById("doaText").innerHTML = `

    <div style="font-size:1.2vw;opacity:0.8;margin-bottom:15px;">
        ${random.nama} • ${random.muqami}
    </div>

    <div>
        “${random.doa}”
    </div>

    `;
}

loadDoa();

</script>
